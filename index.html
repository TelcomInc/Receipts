<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Employee Receipts</title>

  <!-- ✅ THIS SCRIPT TAG WAS THE MISSING PIECE -->
  <script src="https://cdn.jsdelivr.net/npm/x.full.min.js

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    input, select, button {
      display: block;
      margin-bottom: 10px;
      width: 300px;
    }
    .receipt {
      border-bottom: 1px solid #ccc;
      margin-top: 10px;
      padding-bottom: 5px;
    }
  </style>
</head>

<body>

<h2>Employee Receipt Submission</h2>

<form id="receiptForm">
  <input id="employee" placeholder="Employee Name" required />
  <input id="vendor" placeholder="Vendor" required />
  <input id="amount" type="number" placeholder="Amount" required />

  <select id="expenseType" required>
    <option value="">Expense Type</option>
    <option>Auto</option>
    <option>Material</option>
    <option>Training</option>
    <option>Lodging</option>
    <option>Other</option>
  </select>

  <input id="otherDesc" placeholder="Describe Other" style="display:none" />

  <input id="cardLast4" placeholder="Last 4 Digits of Card" maxlength="4" required />

  <button type="submit">Submit Receipt</button>
</form>

<hr />

<button onclick="exportExcel()">Export to Excel</button>

<h3>Submitted Receipts</h3>
<div id="list"></div>

<script>
  const receipts = [];

  const form = document.getElementById("receiptForm");
  const expenseType = document.getElementById("expenseType");
  const otherDesc = document.getElementById("otherDesc");
  const list = document.getElementById("list");

  expenseType.onchange = () => {
    otherDesc.style.display =
      expenseType.value === "Other" ? "block" : "none";
  };

  form.onsubmit = (e) => {
    e.preventDefault();

    const receipt = {
      employee: employee.value,
      vendor: vendor.value,
      amount: amount.value,
      type: expenseType.value,
      description: otherDesc.value,
      card: cardLast4.value,
      date: new Date().toLocaleDateString()
    };

    receipts.push(receipt);
    render();
    form.reset();
    otherDesc.style.display = "none";
  };

  function render() {
    list.innerHTML = "";
    receipts.forEach(r => {
      list.innerHTML += `
        <div class="receipt">
          <strong>${r.employee}</strong> – ${r.vendor} – $${r.amount}<br/>
          ${r.type} – ${r.date} – Card ****${r.card}
        </div>
      `;
    });
  }

  function exportExcel() {
    const ws = XLSX.utils.json_to_sheet(receipts);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Receipts");
    XLSX.writeFile(wb, "employee_receipts.xlsx");
  }
</script>

</body>
</html>
``
